[workspace]
name = "velox-native-reference"
version = "0.1.0"
description = "Maintainer-only toolchain for the Velox C++23 reference host"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
clangxx = ">=21,<22"
cmake = ">=4.1,<5"
lld = ">=21,<22"
ninja = ">=1.13,<2"

[tasks]
cpp-configure = "cmake -S host/reference-cpp -B .cache/cpp-build -G Ninja -DCMAKE_BUILD_TYPE=Release"
cpp-build = { cmd = "cmake --build .cache/cpp-build --config Release", depends-on = ["cpp-configure"] }
